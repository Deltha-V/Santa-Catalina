version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: sc_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sc_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sc_app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sc_app"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  sc_app_pgdata:
